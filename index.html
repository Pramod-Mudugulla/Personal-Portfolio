<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pramod Mudugulla | Software Engineer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
    // Initialize theme early to prevent flickering - default to light
    if (localStorage.theme === 'dark') {
      document.documentElement.classList.add('dark');
    } else {
      document.documentElement.classList.remove('dark');
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      transition: background-color 0.5s ease, color 0.5s ease;
    }

    /* Fix for fixed header overlapping sections */
    section[id] {
      scroll-margin-top: 100px;
    }

    .text-huge {
      font-size: clamp(3rem, 10vw, 8rem);
      line-height: 0.9;
      letter-spacing: -0.05em;
    }

    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Modal Animations */
    @keyframes modalBackdropIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes modalSlideUp {
      from {
        opacity: 0;
        transform: translateY(60px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-backdrop {
      animation: modalBackdropIn 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    .modal-content {
      animation: modalSlideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
  </style>

}
</script>
</head>

</body>

</html>
